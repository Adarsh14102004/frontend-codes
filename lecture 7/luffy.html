<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Card Slider</title>
    <link rel="stylesheet" href="kun.css">
</head>

<body>

    <div class="container">

        <!-- Left Side Cards -->
        <div class="card-stack">

            <div class="card top">
                <img src="https://picsum.photos/id/1011/500/300" alt="">
            </div>

            <div class="card upper">
                <img src="https://picsum.photos/id/1015/500/300" alt="">
            </div>

            <div class="card active">
                <img src="https://picsum.photos/id/1025/500/300" alt="">
            </div>

            <div class="card lower">
                <img src="https://picsum.photos/id/1035/500/300" alt="">
            </div>

            <div class="card bottom">
                <img src="https://picsum.photos/id/1045/500/300" alt="">
            </div>

        </div>


        <div class="content">

            <div class="buttons">
                <button>⬆️</button>
                <button>⬇️</button>
            </div>

            <h1>Luffy kun</h1>

            <div class="designation">
                <span></span>
                <p>MARKETING MANAGER</p>
                <span></span>
            </div>

            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span class="active-dot"></span>
                <span></span>
            </div>

        </div>

    </div>

</body>

</html>
