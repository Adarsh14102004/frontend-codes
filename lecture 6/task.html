<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Clone</title>
    <link rel="stylesheet" href="ts.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h1>≡Medium</h1>

        <ul>
            <li><i class="fa-solid fa-house"></i> Home</li>
            <li><i class="fa-regular fa-bookmark"></i> Library</li>
            <li><i class="fa-regular fa-user"></i> Profile</li>
            <li><i class="fa-regular fa-file-lines"></i> Stories</li>
            <li><i class="fa-solid fa-chart-column"></i> Stats</li>
        </ul>

        <hr>

        <ul>
            <li><i class="fa-solid fa-users"></i> Following</li>
            <li><i class="fa-solid fa-plus"></i> Find writers</li>
        </ul>
    </aside>


    <main class="content">


        <header class="header">
            <input type="text" placeholder="Search">
            <button class="write-btn"><i class="fa-solid fa-pen-to-square"></i> Write</button>
        </header>
        <div class="article">
            <div class="article-content">
                <div class="author">Data Science Collective • Feb 23</div>
                <div class="title">Should You Still Learn to Code in 2026?</div>
                <div class="desc">The answer isn't as obvious as it used to be.</div>
                <div class="stats">⭐ 3.5K 💬176 🔁 78 &nbsp; &nbsp; &nbsp;
                    <span>ada</span>
                </div>
            </div>

            <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=600" alt="">
        </div>





</body>

</html>
