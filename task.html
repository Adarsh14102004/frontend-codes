<!-- make a form in this form we have first name middle name and last name and phone number and email and description and password and submit in html code 
    -->
<!DOCTYPE html>


<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!DOCTYPE html>
    <html>

    <head>
        <title>Registration Form</title>
    </head>

    <body>

        <h2>User Registration Form</h2>

        <form>
            <label for="fname" placeholder="Enter your first name">First Name:</label><br>
            <input type="text" id="fname" name="fname" placeholder="Enter your first name" required><br><br>

            <label for="mname" placeholder="Enter your middle name">Middle Name:</label><br>
            <input type="text" id="mname" name="mname" placeholder="Enter your middle name"><br><br>

            <label for="lname" placeholder="Enter your last name">Last Name:</label><br>
            <input type="text" id="lname" name="lname" placeholder="Enter your last name" required><br><br>

            <label for="phone" placeholder="Enter your phone number">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required><br><br>

            <label for="email" placeholder="Enter your email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

            <label for="description" placeholder="Enter a description">Description:</label><br>
            <textarea id="description" name="description" rows="4" cols="30" placeholder="Enter a description"></textarea><br><br>

            <label for="password" placeholder="Enter your password">Password:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter your password" required><br><br>

            <input type="submit" value="Submit">
        </form>
        <img src="image.jpg" alt="Description of the image">

    </html>

    </body>

</html>
