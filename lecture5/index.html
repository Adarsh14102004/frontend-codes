<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Card</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Georgia, serif;
        }
        
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .card {
            width: 400px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            overflow: hidden;
        }
        
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        
        .date {
            color: gray;
            margin-top: 20px;
            font-size: 14px;
        }
        
        h1 {
            margin: 10px 0;
            font-size: 42px;
        }
        
        p {
            padding: 0 25px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        
        .footer {
            background: #e91e63;
            color: white;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
        }
        
        .box h2 {
            font-size: 28px;
        }
        
        .box span {
            display: block;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>

</head>

<body>

    <div class="card">

        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800" alt="Mountain">

        <div class="date">4 days ago</div>

        <h1>Post One</h1>

        <p>
            Lorem ipsum dolor sit amet consectetur. Ducimus, repudiandae temporibus omnis illum maxime quod deserunt eligendi dolor.
        </p>

        <div class="footer">

            <div class="box">
                <h2>4<sup>m</sup></h2>
                <span>READ</span>
            </div>

            <div class="box">
                <h2>5123</h2>
                <span>VIEWS</span>
            </div>

            <div class="box">
                <h2>32</h2>
                <span>COMMENTS</span>
            </div>

        </div>

    </div>

</body>

</html>
