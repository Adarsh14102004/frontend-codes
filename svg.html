<!DOCTYPE html>
<html>

<head>
    <title>HTML Elements Demo</title>
</head>

<body>

    <h2>Image</h2>
    <img src="https://www.equinetmedia.com/hubfs/How-to-find-b2b-blog-images.png" alt="Sample Image" width="300">

    <h2>Video</h2>
    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <h2>Audio</h2>
    <audio controls>
        <source src="atlasaudio-birthday-491022 (1).mp3" type="audio/mpeg">
    </audio>

    <h2>Iframe</h2>

    <iframe width=" 560 " height="315 " src="https://www.youtube-nocookie.com/embed/WwSyB8yo2XI?si=H-fVwKkcXlHe_vPz " title="YouTube video player " frameborder="0 " allow="accelerometer; autoplay; clipboard-write; encrypted-media;
        gyroscope; picture-in-picture; web-share " referrerpolicy="strict-origin-when-cross-origin " allowfullscreen></iframe>

    <h2>Object</h2>
    <object data="sample.pdf " width="500 " height="300 "></object>


    <h2>SVG</h2>
    <svg width="200" height="200">
        <circle cx="100" cy="100" r="80" stroke="black" fill="lightblue"/>
    </svg>

    <h2>Canvas</h2>
    <canvas width="300" height="150" style="border:1px solid black;"></canvas>


</body>

</html>
