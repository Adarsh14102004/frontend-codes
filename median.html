<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Clone</title>
    <link rel="stylesheet" href="median.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>


    <!-- Top Navbar -->
    <header class="topbar">
        <div class="left">
            <span>File</span>
            <span>Resize</span>
            <span>🖋️Editing</span>
            <span>↩️</span>
            <span>↪️</span>
            <span>☑</span>
        </div>

        <div class="center">
            <h3>Sample</h3>
        </div>

        <div class="right">
            <button>📊</button>
            <button class="trial">💬</button>
            <button>Present</button>
            <button class="share">Share</button>
        </div>
    </header>

    <div class="container">
        <div class="left-panel">

            <div class="menu-item active">
                <span class="icon">📋</span>
                <span class="text">Templates</span>
            </div>

            <div class="menu-item">
                <span class="icon">◈</span>
                <span class="text">Elements</span>
            </div>

            <div class="menu-item">
                <span class="icon">T</span>
                <span class="text">Text</span>
            </div>

            <div class="menu-item">
                <span class="icon">👑</span>
                <span class="text">Brand</span>
            </div>

            <div class="menu-item">
                <span class="icon">☁</span>
                <span class="text">Uploads</span>
            </div>

            <div class="menu-item">
                <span class="icon">✎</span>
                <span class="text">Tools</span>
            </div>

            <div class="menu-item">
                <span class="icon">📁</span>
                <span class="text">Projects</span>
            </div>

            <div class="menu-item">
                <span class="icon">⊞</span>
                <span class="text">Apps</span>
            </div>

            <div class="divider"></div>

            <div class="menu-item">
                <span class="icon">✨</span>
                <span class="text">Magic Media</span>
            </div>

            <div class="menu-item">
                <span class="icon">🎵</span>
                <span class="text">Audio</span>
            </div>

            <div class="menu-item">
                <span class="icon">◯</span>
                <span class="text">videoforme</span>
            </div>

        </div>

        <!-- Sidebar -->
        <aside class="sidebar">

            <div class="search-box">
                <input type="text" placeholder="Describe your ideal design">
            </div>

            <div class="buttons">
                <button>Generate</button>
                <button>Search</button>
            </div>

            <div class="templates">
                <div class="card"><img src="an1.png" height="120px" width="140px"></div>
                <div class="card"><img src="an2.png" height="120px" width="140px"></div>
                <div class="card"><img src="an3.png" height="120px" width="140px"></div>
                <div class="card"><img src="an3.png" height="120px" width="140px"></div>
                <div class="card"><img src="an4.png" height="120px" width="140px"></div>
                <div class="card"><img src="an5.png" height="120px" width="14b0px"></div>
            </div>

        </aside>

        <!-- Main Canvas -->
        <main class="workspace">

            <div class="toolbar">
                <span>Edit 🔴 ☰ ╭• ▦ &ensp; Effects</span>
                <span>Effects</span>
                <span>Animate</span>
                <span>Position</span>
            </div>

            <div class="canvas">

                <!-- Row 1 -->
                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <!-- Row 2 -->
                <div class="plus">+</div>
                <div class="parallelogram"></div>
                <div class="arrow"></div>
                <div class="heart"></div>

            </div>

            <div class="bottom-panel">
                <div class="page-preview"></div>
                <button class="add-page">+</button>
            </div>

        </main>
        <footer class="footer-bar">

            <div class="footer-left">
                <span>📝 Notes</span>
                <span>⏱ Timer</span>
            </div>

            <div class="footer-center">
                <div class="shape-box">
                    <span>🟢</span>
                    <span>🟨</span>
                    <span>🔺</span>
                    <span>⬟</span>
                    <span>⬜</span>
                    <span>🟪</span>
                    <span>⬆️</span>
                    <span>❤️</span>
                </div>

                <button class="add-btn">+</button>

                <select class="dropdown">
            <option></option>
        </select>
            </div>

            <div class="footer-right">
                <input type="range" min="0" max="100" value="53">
                <span>53%</span>

                <button>📄 Pages</button>
                <span>1 / 1</span>

                <button>⬜</button>
                <button>🗑️</button>
            </div>

        </footer>

    </div>

</body>

</html>
