<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Clone</title>
    <link rel="stylesheet" href="cloud_clone.css">
</head>

<body>

    <!-- Top Navbar -->
    <header class="topbar">
        <div class="left">
            <span>File</span>
            <span>Resize</span>
            <span>🖋️Editing</span>
            <span>↩️</span>
            <span>↪️</span>
            <span>☑</span>
        </div>

        <div class="center">
            <h3>Sample</h3>
        </div>

        <div class="right">
            <button>📊</button>
            <button class="trial">💬</button>
            <button>Present</button>
            <button class="share">Share</button>
        </div>
    </header>

    <div class="container">


        <aside class="sidebar">

            <div class="search-box">
                <input type="text" placeholder="Describe your ideal design">
            </div>

            <div class="buttons">
                <button>Generate</button>
                <button>Search</button>
            </div>

            <div class="templates">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </div>

        </aside>


        <main class="workspace">

            <div class="toolbar">
                <span>Edit 🔴 ☰ ╭• ▦ &ensp; Effects</span>
                <span>Effects</span>
                <span>Animate</span>
                <span>Position</span>
            </div>

            <div class="canvas">

                <!-- Row 1 -->
                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <!-- Row 2 -->
                <div class="plus">+</div>
                <div class="parallelogram"></div>
                <div class="arrow"></div>
                <div class="heart"></div>

            </div>

            <div class="bottom-panel">
                <div class="page-preview"></div>
                <button class="add-page">+</button>
            </div>

        </main>

    </div>

</body>

</html>
